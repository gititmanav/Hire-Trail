<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="popup.css">
  <title>HireTrail</title>
</head>
<body>
  <div id="app">
    <!-- Loading state while checking session -->
    <div id="loading-view">
      <div class="logo">
        <div class="logo-icon">H</div>
        <span class="logo-text">HireTrail</span>
      </div>
      <p class="loading-text">Checking login...</p>
    </div>

    <!-- Login Form -->
    <div id="login-view" style="display:none;">
      <div class="logo">
        <div class="logo-icon">H</div>
        <span class="logo-text">HireTrail</span>
      </div>
      <form id="login-form">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" id="login-btn">Log in</button>
        <p id="login-error" class="error"></p>
      </form>

      <div class="divider">
        <span>or</span>
      </div>

      <button id="google-btn" class="btn btn-google" type="button">
        <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign in with Google
      </button>
      <p id="google-error" class="error"></p>
    </div>

    <!-- Logged In View -->
    <div id="logged-in-view" style="display:none;">
      <div class="header">
        <div class="logo">
          <div class="logo-icon">H</div>
          <span class="logo-text">HireTrail</span>
        </div>
      </div>
      <div class="user-info">
        <div class="avatar" id="user-avatar"></div>
        <div>
          <p class="user-name" id="user-name"></p>
          <p class="user-email" id="user-email"></p>
        </div>
      </div>
      <div class="stats">
        <p id="track-count">Ready to track jobs</p>
      </div>
      <div class="diagnostics">
        <div class="diagnostics-header">
          <p class="diagnostics-title">Diagnostics</p>
          <button id="clear-diagnostics" class="link-btn" type="button">Clear</button>
        </div>
        <p id="diag-summary" class="diag-summary">Loading diagnostics...</p>
        <p id="diag-last-error" class="diag-last-error"></p>
        <div class="llm-controls">
          <label class="llm-toggle">
            <input type="checkbox" id="llm-enabled">
            <span>Enable optional LLM tags</span>
          </label>
          <input id="llm-endpoint" type="url" placeholder="https://.../enrich (optional endpoint)">
          <p class="llm-help">If configured, extension will attempt LLM enrichment and gracefully fall back to rule-based tags.</p>
        </div>
      </div>
      <div class="actions">
        <a id="open-app" class="btn btn-primary" target="_blank">Open HireTrail</a>
        <button id="logout-btn" class="btn btn-secondary">Log out</button>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
