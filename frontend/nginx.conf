# Serves the SPA and reverse-proxies /api → the backend container (same-origin,
# so session cookies + the CORS allowlist just work). Used by the `full` profile.
server {
  listen 80;
  server_name _;

  # API → backend service on the compose network.
  location /api/ {
    proxy_pass http://backend:5050;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 90s;
  }

  # SPA: static assets with a history-API fallback to index.html.
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }
}
